# Amos AI — ECS 部署
version: "3.8"

services:
  amos:
    build: .
    container_name: amos-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8088:8080"
    environment:
      - GLM_API_KEY=${GLM_API_KEY}
      - QWEN_API_KEY=${QWEN_API_KEY}
      - FLASK_DEBUG=0
      - HF_ENDPOINT=https://hf-mirror.com
    volumes:
      # 试卷 PDF — ECS 上已有
      - /opt/papers:/app/papers:ro
      # 向量数据库 — 持久化
      - /opt/amos-data/chroma_db:/app/data/chroma_db
      # 试卷索引 SQLite
      - /opt/amos-data/papers.db:/app/past-paper-library/papers.db
      # 训练数据
      - /opt/amos-data/training_set.jsonl:/app/data/training_set.jsonl
    mem_limit: 1g
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
