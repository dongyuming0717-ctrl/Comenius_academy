# HTTP → HTTPS redirect
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/www.comenius.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.comenius.cn/privkey.pem;

    root /opt/online-proctoring/client/dist;
    index index.html;

    # API proxy to Express backend
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Past Paper Library (Flask)
    location /cie-papers/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # TMUA PDF past papers
    location /tmua-papers/ {
        alias /opt/papers/TMUA/;
        add_header Content-Type application/pdf;
    }

    # Static question images
    location /question-images/ {
        alias /opt/online-proctoring/client/dist/question-images/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Static assets with long cache
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
