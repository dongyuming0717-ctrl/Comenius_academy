name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: online-proctoring/client/package-lock.json

      - name: Install dependencies
        working-directory: online-proctoring/client
        run: npm ci

      - name: Lint
        working-directory: online-proctoring/client
        run: npm run lint

      - name: Test
        working-directory: online-proctoring/client
        run: npm test

      - name: Type check
        working-directory: online-proctoring/client
        run: npx tsc --noEmit

      - name: Build
        working-directory: online-proctoring/client
        run: npm run build
