# Amos AI — Comenius Academy (HTTPS + HTTP)
server {
    listen 80;
    server_name comenius.cn www.comenius.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name comenius.cn www.comenius.cn;

    ssl_certificate /etc/letsencrypt/live/www.comenius.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.comenius.cn/privkey.pem;

    # SSE Chat API — 禁用缓冲
    location /api/chat {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        chunked_transfer_encoding off;
    }

    # 其他 API
    location /api/ {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # PDF 文件
    location /api/pdf/ {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
    }

    location /api/download/ {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
    }

    # Static files with long cache
    location /static/ {
        proxy_pass http://127.0.0.1:8088;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 主页
    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
