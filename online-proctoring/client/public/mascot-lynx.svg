<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" fill="none">
  <defs>
    <!-- Brand blues for fur shading -->
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d5ec9"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="headGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b6fdb"/>
      <stop offset="100%" stop-color="#2d5ec9"/>
    </linearGradient>
    <!-- Amber eye gradient -->
    <radialGradient id="eyeGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="60%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </radialGradient>
    <!-- Glasses lens gradient -->
    <linearGradient id="lensGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- ===== TAIL (behind body) ===== -->
  <g id="tail">
    <path d="M230,210 Q260,205 268,195 Q275,185 272,172 Q269,162 260,160 Q250,160 242,168 Q225,180 225,200 Z"
      fill="url(#bodyGrad)" stroke="#1e3a8a" stroke-width="1.5"/>
    <!-- Tail black tip -->
    <path d="M260,160 Q269,162 272,172 Q275,185 268,195 Q265,198 262,195 Q268,182 268,172 Q265,164 260,160 Z"
      fill="#0f172a"/>
  </g>

  <!-- ===== BODY (seated, upright) ===== -->
  <g id="body">
    <!-- Main torso -->
    <ellipse cx="150" cy="195" rx="58" ry="70" fill="url(#bodyGrad)" stroke="#1e3a8a" stroke-width="1.5"/>
    <!-- Chest/belly lighter patch -->
    <ellipse cx="150" cy="200" rx="32" ry="52" fill="#dbeafe" opacity="0.6"/>
  </g>

  <!-- ===== PAWS ===== -->
  <g id="paws">
    <!-- Left paw -->
    <ellipse cx="118" cy="265" rx="22" ry="16" fill="#2d5ec9" stroke="#1e3a8a" stroke-width="1.5"/>
    <!-- Left paw toes -->
    <path d="M104,268 Q108,258 112,268" stroke="#1e3a8a" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M112,270 Q116,260 120,270" stroke="#1e3a8a" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <!-- Right paw -->
    <ellipse cx="182" cy="265" rx="22" ry="16" fill="#2d5ec9" stroke="#1e3a8a" stroke-width="1.5"/>
    <!-- Right paw toes -->
    <path d="M168,268 Q172,258 176,268" stroke="#1e3a8a" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M176,270 Q180,260 184,270" stroke="#1e3a8a" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <!-- Paw pads (light) -->
    <ellipse cx="118" cy="270" rx="10" ry="6" fill="#dbeafe" opacity="0.5"/>
    <ellipse cx="182" cy="270" rx="10" ry="6" fill="#dbeafe" opacity="0.5"/>
  </g>

  <!-- ===== LEFT EAR ===== -->
  <g id="ear-left">
    <path d="M95,95 L78,45 L130,85 Z" fill="#2d5ec9" stroke="#1e3a8a" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Inner ear -->
    <path d="M98,90 L85,55 L125,84 Z" fill="#dbeafe" opacity="0.5"/>
    <!-- Ear tuft -->
    <path d="M78,45 Q72,35 75,22 Q78,8 82,10 Q84,15 82,28 L80,42 Q79,44 78,45 Z"
      fill="#0f172a"/>
    <path d="M78,45 Q74,38 72,30" stroke="#0f172a" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M80,44 Q78,38 76,30" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  </g>

  <!-- ===== RIGHT EAR ===== -->
  <g id="ear-right">
    <path d="M205,95 L222,45 L170,85 Z" fill="#2d5ec9" stroke="#1e3a8a" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Inner ear -->
    <path d="M202,90 L215,55 L175,84 Z" fill="#dbeafe" opacity="0.5"/>
    <!-- Ear tuft -->
    <path d="M222,45 Q228,35 225,22 Q222,8 218,10 Q216,15 218,28 L220,42 Q221,44 222,45 Z"
      fill="#0f172a"/>
    <path d="M222,45 Q226,38 228,30" stroke="#0f172a" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M220,44 Q222,38 224,30" stroke="#0f172a" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  </g>

  <!-- ===== HEAD ===== -->
  <g id="head">
    <!-- Main head shape - lynx has wide cheeks (ruff) -->
    <path d="M150,60 Q200,60 215,95 Q225,125 218,145 Q210,165 185,170
             Q160,178 150,180 Q140,178 115,170 Q90,165 82,145
             Q75,125 85,95 Q100,60 150,60 Z"
      fill="url(#headGrad)" stroke="#1e3a8a" stroke-width="1.5"/>

    <!-- Facial ruff - lighter cheek fur -->
    <path d="M85,95 Q75,125 82,145 Q90,162 115,170 Q140,178 150,180
             L150,140 Q130,135 115,125 Q100,110 100,95 Q98,80 100,65 Z"
      fill="#dbeafe" opacity="0.35"/>
    <path d="M215,95 Q225,125 218,145 Q210,162 185,170 Q160,178 150,180
             L150,140 Q170,135 185,125 Q200,110 200,95 Q202,80 200,65 Z"
      fill="#dbeafe" opacity="0.35"/>

    <!-- Forehead marking (lynx often have subtle forehead stripes) -->
    <path d="M140,70 L150,85 L160,70" stroke="#1e3a8a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.3"/>
    <path d="M130,72 L140,88 L150,72" stroke="#1e3a8a" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.2"/>
    <path d="M150,72 L160,88 L170,72" stroke="#1e3a8a" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.2"/>
  </g>

  <!-- ===== FACE DETAILS ===== -->
  <g id="face">
    <!-- Nose -->
    <path d="M147,128 L150,134 L153,128 Q153,124 150,123 Q147,124 147,128 Z"
      fill="#f472b6"/>

    <!-- Mouth - gentle smile (idle) -->
    <path d="M145,138 Q150,144 155,138" stroke="#1e3a8a" stroke-width="1.2" stroke-linecap="round" fill="none"/>
    <!-- Little chin line -->
    <path d="M150,140 L150,145" stroke="#1e3a8a" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.4"/>

    <!-- Whisker dots -->
    <circle cx="132" cy="130" r="1.5" fill="#1e3a8a" opacity="0.4"/>
    <circle cx="128" cy="135" r="1.5" fill="#1e3a8a" opacity="0.4"/>
    <circle cx="132" cy="140" r="1.5" fill="#1e3a8a" opacity="0.4"/>
    <circle cx="168" cy="130" r="1.5" fill="#1e3a8a" opacity="0.4"/>
    <circle cx="172" cy="135" r="1.5" fill="#1e3a8a" opacity="0.4"/>
    <circle cx="168" cy="140" r="1.5" fill="#1e3a8a" opacity="0.4"/>

    <!-- Whiskers -->
    <line x1="125" y1="128" x2="100" y2="120" stroke="#1e3a8a" stroke-width="0.8" stroke-linecap="round" opacity="0.25"/>
    <line x1="124" y1="134" x2="98" y2="134" stroke="#1e3a8a" stroke-width="0.8" stroke-linecap="round" opacity="0.25"/>
    <line x1="125" y1="140" x2="100" y2="148" stroke="#1e3a8a" stroke-width="0.8" stroke-linecap="round" opacity="0.25"/>
    <line x1="175" y1="128" x2="200" y2="120" stroke="#1e3a8a" stroke-width="0.8" stroke-linecap="round" opacity="0.25"/>
    <line x1="176" y1="134" x2="202" y2="134" stroke="#1e3a8a" stroke-width="0.8" stroke-linecap="round" opacity="0.25"/>
    <line x1="175" y1="140" x2="200" y2="148" stroke="#1e3a8a" stroke-width="0.8" stroke-linecap="round" opacity="0.25"/>
  </g>

  <!-- ===== EYES (idle - alert but friendly) ===== -->
  <g id="eyes-idle">
    <!-- Left eye -->
    <ellipse cx="130" cy="108" rx="14" ry="15" fill="white" stroke="#1e3a8a" stroke-width="1.5"/>
    <ellipse cx="130" cy="109" rx="9" ry="10" fill="url(#eyeGrad)"/>
    <ellipse cx="130" cy="108" rx="4" ry="5" fill="#0f172a"/>
    <!-- Eye highlight -->
    <ellipse cx="127" cy="105" rx="2.5" ry="2" fill="white" opacity="0.9"/>
    <ellipse cx="132" cy="110" rx="1" ry="0.8" fill="white" opacity="0.4"/>

    <!-- Right eye -->
    <ellipse cx="170" cy="108" rx="14" ry="15" fill="white" stroke="#1e3a8a" stroke-width="1.5"/>
    <ellipse cx="170" cy="109" rx="9" ry="10" fill="url(#eyeGrad)"/>
    <ellipse cx="170" cy="108" rx="4" ry="5" fill="#0f172a"/>
    <!-- Eye highlight -->
    <ellipse cx="167" cy="105" rx="2.5" ry="2" fill="white" opacity="0.9"/>
    <ellipse cx="172" cy="110" rx="1" ry="0.8" fill="white" opacity="0.4"/>
  </g>

  <!-- ===== EYEBROWS (idle - relaxed, slightly raised) ===== -->
  <g id="eyebrows-idle">
    <!-- Left eyebrow -->
    <path d="M115,93 Q122,88 138,92" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <!-- Right eyebrow -->
    <path d="M162,92 Q178,88 185,93" stroke="#0f172a" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  </g>

  <!-- ===== GLASSES ===== -->
  <g id="glasses">
    <!-- Bridge -->
    <path d="M146,107 Q150,103 154,107" stroke="#0f172a" stroke-width="2" stroke-linecap="round" fill="none"/>
    <!-- Left lens frame -->
    <circle cx="130" cy="108" r="18" stroke="#0f172a" stroke-width="2.2" fill="url(#lensGrad)"/>
    <!-- Right lens frame -->
    <circle cx="170" cy="108" r="18" stroke="#0f172a" stroke-width="2.2" fill="url(#lensGrad)"/>
    <!-- Temple arms -->
    <path d="M112,108 Q100,106 92,100" stroke="#0f172a" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <path d="M188,108 Q200,106 208,100" stroke="#0f172a" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  </g>

  <!-- ===== BADGE (small name tag on chest) ===== -->
  <g id="badge">
    <rect x="135" y="158" width="30" height="18" rx="3" fill="white" stroke="#1e3a8a" stroke-width="1"/>
    <text x="150" y="171" text-anchor="middle" font-family="Inter, sans-serif" font-size="7" font-weight="700" fill="#1e40af">LYNX</text>
  </g>
</svg>
